services:
  - type: web
    name: telegram-bot-api-local
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_LOCAL
        value: "1"
    # Elimina healthCheckPath para evitar errores
